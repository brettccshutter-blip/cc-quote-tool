<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>C&C Shutters Estimate</title>

<style>
body{
  font-family: Arial, Helvetica, sans-serif;
  margin:0;
  padding:20px;
  background:#ffffff;
  color:#111;
}
.container{ max-width:1000px; margin:auto; }

.header{
  border-bottom:2px solid #000;
  padding-bottom:12px;
  margin-bottom:20px;
  display:flex;
  justify-content:space-between;
  flex-wrap:wrap;
}
.header h1{ margin:0; }
.header .info{ font-size:13px; color:#444; margin-top:4px; }

.meta{ text-align:right; font-size:13px; }

.section{ margin-bottom:20px; }
label{ font-size:13px; color:#555; }

input, select{
  padding:8px;
  border:1px solid #ccc;
  border-radius:6px;
  font-size:16px;
  width:100%;
  box-sizing:border-box;
}

.flexline{
  display:flex;
  gap:10px;
  margin-top:5px;
}

button{
  padding:10px 14px;
  margin-right:10px;
  border:none;
  background:#111;
  color:#fff;
  border-radius:6px;
  font-weight:bold;
  cursor:pointer;
}
button.clear{
  background:#fff;
  color:#c00;
  border:1px solid #c00;
}

table{
  width:100%;
  border-collapse:collapse;
  margin-top:20px;
}
th, td{
  border:1px solid #ddd;
  padding:10px;
  text-align:left;
}
th{ background:#f5f5f5; }

.total{
  font-size:20px;
  font-weight:bold;
  margin-top:15px;
}

.signature{
  margin-top:40px;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:40px;
}
.line{
  border-bottom:1px solid #000;
  height:25px;
}
.small{ font-size:12px; color:#555; margin-top:6px; }

@media print{
  button{ display:none; }
  body{ padding:0; }
}
</style>
</head>

<body>
<div class="container">

<div class="header">
  <div>
    <h1>C&C Shutters and Window Coverings</h1>
    <div class="info">
      Phone: <b>951-897-3721</b> |
      License #: <b>1074811</b> |
      Brett.ccshutter@gmail.com
    </div>
  </div>
  <div class="meta">
    <div><b>Estimate</b></div>
    <div id="today"></div>
    <div>Quote #: <span id="jobOut">—</span></div>
  </div>
</div>

<div class="section flexline">
  <div style="flex:1;">
    <label>Customer Name</label>
    <input id="custName">
  </div>
  <div style="flex:1;">
    <label>Phone / Email</label>
    <input id="custContact">
  </div>
</div>

<div class="section flexline">
  <div style="flex:1;">
    <label>Job Address</label>
    <input id="jobAddress">
  </div>
  <div style="flex:1;">
    <label>Quote / Job #</label>
    <input id="jobNumber">
  </div>
</div>

<hr>

<div class="section">
  <label>Room / Location</label>
  <input id="room">

  <div style="margin-top:15px;">
    <label>Width</label>
    <div class="flexline">
      <input id="wWhole" type="number" value="0" class="autoClear" style="flex:2;">
      <select id="wFrac" style="flex:1;"></select>
    </div>
  </div>

  <div style="margin-top:15px;">
    <label>Height</label>
    <div class="flexline">
      <input id="hWhole" type="number" value="0" class="autoClear" style="flex:2;">
      <select id="hFrac" style="flex:1;"></select>
    </div>
  </div>
</div>

<div class="section flexline">
  <div style="flex:1;">
    <label>Price Per Sq Ft</label>
    <input id="price" type="number" value="0" class="autoClear">
  </div>
  <div style="flex:1;">
    <label>Extra Fees</label>
    <input id="extras" type="number" value="0" class="autoClear">
  </div>
  <div style="flex:1;">
    <label>Installation Fee</label>
    <input id="install" type="number" value="0" class="autoClear">
  </div>
  <div style="flex:1;">
    <label>Tax %</label>
    <input id="tax" type="number" value="0" class="autoClear">
  </div>
</div>

<button onclick="addWindow()">Add Window</button>
<button onclick="window.print()">Print / Save PDF</button>
<button onclick="clearJob()" class="clear">Clear Job</button>

<table>
<thead>
<tr>
<th>#</th>
<th>Room</th>
<th>Original Size</th>
<th>Sq Ft</th>
<th>Total</th>
</tr>
</thead>
<tbody id="jobRows"></tbody>
</table>

<div class="total" id="grandTotal">Grand Total: $0.00</div>

</div>

<script>
const FRACTIONS = [
["0",0],["1/8",0.125],["1/4",0.25],["3/8",0.375],
["1/2",0.5],["5/8",0.625],["3/4",0.75],["7/8",0.875]
];

let job=[];
let savedPrice=null;

function populateFractions(){
["wFrac","hFrac"].forEach(id=>{
const sel=document.getElementById(id);
FRACTIONS.forEach(([label,val])=>{
const opt=document.createElement("option");
opt.value=val;
opt.textContent=label;
sel.appendChild(opt);
});
});
}

function num(id){
const v=parseFloat(document.getElementById(id).value);
return isFinite(v)?v:0;
}

function addWindow(){
const room=document.getElementById("room").value;
const wWhole=num("wWhole");
const hWhole=num("hWhole");
const wFrac=num("wFrac");
const hFrac=num("hFrac");

const w=wWhole+wFrac;
const h=hWhole+hFrac;

if(savedPrice===null||savedPrice===0){
savedPrice=num("price");
}

const extras=num("extras");
const install=num("install");
const taxPct=num("tax");

const adjW=w+5;
const adjH=h+5;

const sqft=Math.ceil((adjW*adjH)/144);
const subtotal=sqft*savedPrice+extras+install;
const tax=subtotal*(taxPct/100);
const total=subtotal+tax;

job.push({
room:room||"-",
size:`${wWhole} ${document.getElementById("wFrac").selectedOptions[0].text} x ${hWhole} ${document.getElementById("hFrac").selectedOptions[0].text}`,
sqft,
total
});

render();
clearInputs();
}

function render(){
const tbody=document.getElementById("jobRows");
tbody.innerHTML="";
let grand=0;

job.forEach((it,i)=>{
grand+=it.total;
tbody.innerHTML+=`
<tr>
<td>${i+1}</td>
<td>${it.room}</td>
<td>${it.size}</td>
<td>${it.sqft}</td>
<td>$${it.total.toFixed(2)}</td>
</tr>`;
});

document.getElementById("grandTotal").innerText=
"Grand Total: $"+grand.toFixed(2);
}

function clearInputs(){
document.getElementById("room").value="";
document.getElementById("wWhole").value=0;
document.getElementById("hWhole").value=0;
document.getElementById("wFrac").value="0";
document.getElementById("hFrac").value="0";
}

function clearJob(){
job=[];
savedPrice=null;
document.getElementById("price").value=0;
render();
clearInputs();
}

// Auto-clear zero when field clicked
document.querySelectorAll(".autoClear").forEach(input=>{
input.addEventListener("focus",function(){
if(this.value==="0"){
this.select();
}
});
});

document.getElementById("jobNumber").addEventListener("input",()=>{
document.getElementById("jobOut").innerText=
document.getElementById("jobNumber").value||"—";
});

document.getElementById("today").innerText=
new Date().toLocaleDateString();

populateFractions();
</script>

</body>
</html>
