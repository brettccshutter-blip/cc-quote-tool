<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>C&C Shutters Quote Tool</title>

<style>
:root {
  --bg:#ffffff;
  --card:#f7f7f7;
  --text:#111111;
  --muted:#555555;
  --line:#dddddd;
  --btn:#111111;
  --btnText:#ffffff;
}

body {
  margin:0;
  font-family: Arial, Helvetica, sans-serif;
  background:var(--bg);
  color:var(--text);
  padding:20px;
}

.card {
  background:var(--card);
  border:1px solid var(--line);
  border-radius:12px;
  padding:20px;
  max-width:900px;
  margin:auto;
}

h1 {
  margin-top:0;
}

label {
  font-size:13px;
  color:var(--muted);
}

input, select {
  width:100%;
  padding:8px;
  margin:5px 0 15px 0;
  border:1px solid var(--line);
  border-radius:6px;
}

button {
  padding:10px;
  background:var(--btn);
  color:var(--btnText);
  border:none;
  border-radius:6px;
  cursor:pointer;
  margin-right:10px;
}

table {
  width:100%;
  border-collapse:collapse;
  margin-top:20px;
}

th, td {
  border-bottom:1px solid var(--line);
  padding:8px;
  text-align:left;
}

.total {
  font-size:20px;
  font-weight:bold;
  margin-top:15px;
}
</style>
</head>

<body>

<div class="card">
<h1>C&C Shutters Quote Tool</h1>

<label>Room / Location</label>
<input id="room">

<label>Width (Whole Inches)</label>
<input id="wWhole" type="number">

<label>Width Fraction</label>
<select id="wFrac">
<option value="0">0</option>
<option value="0.125">1/8</option>
<option value="0.25">1/4</option>
<option value="0.375">3/8</option>
<option value="0.5">1/2</option>
<option value="0.625">5/8</option>
<option value="0.75">3/4</option>
<option value="0.875">7/8</option>
</select>

<label>Height (Whole Inches)</label>
<input id="hWhole" type="number">

<label>Height Fraction</label>
<select id="hFrac">
<option value="0">0</option>
<option value="0.125">1/8</option>
<option value="0.25">1/4</option>
<option value="0.375">3/8</option>
<option value="0.5">1/2</option>
<option value="0.625">5/8</option>
<option value="0.75">3/4</option>
<option value="0.875">7/8</option>
</select>

<label>Price Per Sq Ft</label>
<input id="price" type="number">

<label>Extra Fees</label>
<input id="extras" type="number" value="0">

<label>Installation Fee</label>
<input id="install" type="number" value="0">

<label>Tax %</label>
<input id="tax" type="number" value="0">

<button onclick="addWindow()">Add Window</button>
<button onclick="clearJob()">Clear Job</button>
<button onclick="window.print()">Print / Save PDF</button>

<table id="jobTable">
<thead>
<tr>
<th>Room</th>
<th>Original Size</th>
<th>Sq Ft</th>
<th>Total</th>
</tr>
</thead>
<tbody></tbody>
</table>

<div class="total" id="grandTotal"></div>

</div>

<script>
let job = [];
let savedPrice = null;

function addWindow(){
let room = document.getElementById("room").value;
let w = parseFloat(wWhole.value) + parseFloat(wFrac.value);
let h = parseFloat(hWhole.value) + parseFloat(hFrac.value);

if(!savedPrice){
savedPrice = parseFloat(price.value);
}

let adjW = w + 5;
let adjH = h + 5;

let sqft = Math.ceil((adjW * adjH) / 144);

let extras = parseFloat(document.getElementById("extras").value);
let install = parseFloat(document.getElementById("install").value);
let taxPercent = parseFloat(document.getElementById("tax").value);

let subtotal = sqft * savedPrice + extras + install;
let tax = subtotal * (taxPercent / 100);
let total = subtotal + tax;

job.push({room, w, h, sqft, total});
render();
clearInputs();
}

function render(){
let tbody = document.querySelector("#jobTable tbody");
tbody.innerHTML = "";
let grand = 0;

job.forEach(item=>{
grand += item.total;
tbody.innerHTML += `
<tr>
<td>${item.room}</td>
<td>${item.w}" x ${item.h}"</td>
<td>${item.sqft}</td>
<td>$${item.total.toFixed(2)}</td>
</tr>`;
});

grandTotal.innerText = "Grand Total: $" + grand.toFixed(2);
}

function clearInputs(){
document.getElementById("room").value="";
document.getElementById("wWhole").value="";
document.getElementById("hWhole").value="";
}

function clearJob(){
job=[];
savedPrice=null;
render();
}
</script>

</body>
</html>
